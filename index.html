<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="bootstrap 5.2/css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="bootstrap 5.2/css/bootstrap.min.css">
    <title>Todo App</title>
  </head>
  <body class="bg-info">
 
    <div class="d-flex justify-content-center mt-5">
      <h1 class="display-1">TODO LIST</h1>
    </div>

      <div class="d-flex justify-content-center container mt-5 w-75">
        <div class="input-group">
          <input type="text" class="form-control" placeholder="add todos" id="input-todo">
          <button type="submit" class="btn rounded-0 bg-white" id="add">add</button>
        </div>
        <div>
          <select class="bg-success h-100 border-0" id="select">
            <option value="all">ALL</option>
            <option value="completed">completed</option>
            <option value="uncompleted">uncompleted</option>
          </select>
        </div>
      </div>

      <div class="todo-list mt-5">
       
      </div>

      
     
  </body> 
  <script src="my js.js"></script>
  </html>
